# Nginx production config for app.imsambulancias.cl

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.imsambulancias.cl;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.imsambulancias.cl;

    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/app.imsambulancias.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.imsambulancias.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    root /var/www/ims/;
    index index.html;

    # Reverse proxy to Django backend
    location /ims/ {
        proxy_pass http://172.31.16.252:8000/ims/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
